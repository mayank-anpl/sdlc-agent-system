<div class="auth-page">
  <div class="auth-card">
    <h1>Create account</h1>

    @if (bannerError) {
      <p class="banner banner-error" role="alert">{{ bannerError }}</p>
    }

    <form (ngSubmit)="submit()" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          name="email"
          autocomplete="email"
          [(ngModel)]="email"
          [disabled]="loading"
          [attr.aria-invalid]="emailError ? true : null"
          [attr.aria-describedby]="emailError ? 'email-error' : null"
        />
        @if (emailError) {
          <p id="email-error" class="field-error">{{ emailError }}</p>
        }
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          name="password"
          autocomplete="new-password"
          [(ngModel)]="password"
          [disabled]="loading"
          [attr.aria-invalid]="passwordError ? true : null"
          [attr.aria-describedby]="passwordError ? 'password-error password-hint' : 'password-hint'"
        />
        <p id="password-hint" class="field-hint">At least 8 characters</p>
        @if (passwordError) {
          <p id="password-error" class="field-error">{{ passwordError }}</p>
        }
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Signing up…' : 'Sign up' }}
      </button>
    </form>

    <p class="auth-footer">
      Already have an account?
      <a routerLink="/login">Log in</a>
    </p>
  </div>
</div>
